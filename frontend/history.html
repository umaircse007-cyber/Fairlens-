<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FairLens - Audit History</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
<header>
    <a class="brand" href="/">FairLens</a>
    <nav>
        <a href="/">Upload</a>
        <a href="/view-history">Audit History</a>
    </nav>
</header>

<main class="container">
    <section class="panel">
        <div class="panel-header">
            <div>
                <p class="eyebrow">Audit log</p>
                <h1>Audit History</h1>
            </div>
            <a class="primary-btn" href="/">Run New Audit</a>
        </div>

        <div class="table-wrap">
            <table>
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Dataset</th>
                        <th>Date</th>
                        <th>Status</th>
                        <th>EU Findings</th>
                    </tr>
                </thead>
                <tbody id="historyBody">
                    <tr><td colspan="5">Loading...</td></tr>
                </tbody>
            </table>
        </div>
    </section>
</main>

<script>
loadHistory();

async function loadHistory() {
    const body = document.getElementById("historyBody");
    try {
        const res = await fetch("/history/list");
        const rows = await res.json();
        if (!rows.length) {
            body.innerHTML = `<tr><td colspan="5">No completed audits yet.</td></tr>`;
            return;
        }

        body.innerHTML = rows.map(row => `
            <tr>
                <td>#${row.id}</td>
                <td><strong>${escapeHtml(row.filename)}</strong></td>
                <td>${new Date(row.timestamp).toLocaleString()}</td>
                <td><span class="badge ${row.compliance_status === "Compliant" ? "green" : "red"}">${escapeHtml(row.compliance_status)}</span></td>
                <td>${row.clause_count}</td>
            </tr>
        `).join("");
    } catch (err) {
        body.innerHTML = `<tr><td colspan="5">Could not load audit history.</td></tr>`;
    }
}

function escapeHtml(value) {
    return String(value ?? "").replace(/[&<>"']/g, char => ({
        "&": "&amp;",
        "<": "&lt;",
        ">": "&gt;",
        '"': "&quot;",
        "'": "&#39;"
    }[char]));
}
</script>
</body>
</html>

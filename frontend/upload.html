<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FairLens - Upload</title>
    <link rel="stylesheet" href="/static/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Outfit:wght@500;700&display=swap" rel="stylesheet">
</head>
<body>
    <header>
        <h1>FairLens</h1>
        <nav>
            <a href="/">Upload</a>
            <a href="/view-history">Audit History</a>
        </nav>
    </header>
    
    <div class="container">
        <div class="card" id="uploadCard">
            <h2>Upload Dataset</h2>
            <p style="color: var(--text-muted); margin-bottom: 2rem;">Upload a CSV dataset to scan for hidden biases.</p>
            
            <div class="upload-area" id="dropzone" onclick="document.getElementById('fileInput').click()">
                <h3>Drag & Drop your CSV here</h3>
                <p>or click to browse</p>
                <input type="file" id="fileInput" accept=".csv,.xlsx" class="hidden">
            </div>
            
            <div id="loader" class="loader-container hidden">
                <div class="loader"></div>
                <p>Running AI Scan...</p>
            </div>
        </div>

        <div class="card hidden" id="findingsCard">
            <h2>AI Scan Findings</h2>
            <ul class="findings-list" id="findingsList"></ul>
            
            <div style="margin-top: 2rem;">
                <h3>Configure Settings</h3>
                <input type="text" id="outcomeCol" placeholder="Outcome column (e.g., hired)">
                <input type="text" id="favorableOutcome" placeholder="Favorable value (e.g., Yes or 1)">
                <input type="text" id="privilegedGroup" placeholder="Privileged group (optional)">
                <button class="btn" id="runAuditBtn">Run Full Audit</button>
            </div>
        </div>
    </div>

    <script>
        const fileInput = document.getElementById('fileInput');
        const dropzone = document.getElementById('dropzone');
        const loader = document.getElementById('loader');
        const findingsCard = document.getElementById('findingsCard');
        const findingsList = document.getElementById('findingsList');
        const runAuditBtn = document.getElementById('runAuditBtn');

        let currentFileId = null;
        let currentFilePath = null;
        let sensitiveCols = [];

        fileInput.addEventListener('change', handleFile);

        async function handleFile(e) {
            const file = e.target.files[0];
            if (!file) return;

            dropzone.classList.add('hidden');
            loader.classList.remove('hidden');

            const formData = new FormData();
            formData.append('file', file);

            try {
                const res = await fetch("/upload/", {
                    method: 'POST',
                    body: formData
                });

                if (!res.ok) {
                    alert("Upload failed");
                    resetUI();
                    return;
                }

                const data = await res.json();

                currentFileId = data.file_id;
                currentFilePath = data.filepath;

                localStorage.setItem('currentFileId', currentFileId);
                localStorage.setItem('currentFilePath', currentFilePath);

                // ✅ NOW CALL AUDIT (this was missing earlier)
                await runAudit();

            } catch (err) {
                console.error(err);
                alert("Upload failed");
                resetUI();
            }
        }

        async function runAudit() {
            try {
                const res = await fetch("/audit/", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({
                        file_id: currentFileId,
                        filepath: currentFilePath
                    })
                });

                if (!res.ok) {
                    alert("Audit failed");
                    resetUI();
                    return;
                }

                const data = await res.json();

                loader.classList.add('hidden');
                findingsCard.classList.remove('hidden');

                renderFindings(data.findings || []);

            } catch (err) {
                console.error(err);
                alert("Audit failed");
                resetUI();
            }
        }

        function renderFindings(findings) {
            findingsList.innerHTML = '';
            sensitiveCols = findings.map(f => f.column);

            if (!findings || findings.length === 0) {
                findingsList.innerHTML = '<li>No sensitive columns detected.</li>';
                return;
            }

            findings.forEach(f => {
                const li = document.createElement('li');

                li.innerHTML = `
                    <strong>${f.column}</strong>
                    <p>${f.reason}</p>
                    <span>${f.type || "flagged"}</span>
                `;

                findingsList.appendChild(li);
            });

            localStorage.setItem('sensitiveCols', JSON.stringify(sensitiveCols));
        }

        function resetUI() {
            loader.classList.add('hidden');
            dropzone.classList.remove('hidden');
            findingsCard.classList.add('hidden');
        }

        runAuditBtn.addEventListener('click', () => {
            const outcome = document.getElementById('outcomeCol').value;
            const favorable = document.getElementById('favorableOutcome').value;
            const priv = document.getElementById('privilegedGroup').value;

            if (!outcome || !favorable) {
                alert("Fill required fields");
                return;
            }

            localStorage.setItem('outcomeCol', outcome);
            localStorage.setItem('favorableOutcome', favorable);

            const privGroups = {};
            if (priv && sensitiveCols.length > 0) {
                privGroups[sensitiveCols[0]] = priv;
            }

            localStorage.setItem('privilegedGroups', JSON.stringify(privGroups));

            window.location.href = "/results";
        });
    </script>
</body>
</html>
